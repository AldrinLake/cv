<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aldrin Lake – CV</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <h1 id="page-title">Curriculum Vitae</h1>
      <div class="lang-switch" role="group" aria-label="Language switch">
        <button type="button" id="lang-en" class="lang-btn active" data-lang="en">EN</button>
        <button type="button" id="lang-zh" class="lang-btn" data-lang="zh">中文</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content" id="content"></main>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
